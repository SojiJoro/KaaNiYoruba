name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generated tables are in sync with the language pack
        run: |
          npm run generate
          git diff --exit-code -- src/lib/yorubaTables.generated.ts ios/Kaa/YorubaNumberTables.generated.swift
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run build
